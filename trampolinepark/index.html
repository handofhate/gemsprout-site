<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GemSprout">
  <meta name="theme-color" content="#1D6B57">
  <title>GemSprout</title>
  <link rel="icon" type="image/png" href="gemsproutpadded.png">
  <link rel="apple-touch-icon" href="gemsproutpadded.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/duotone/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ═══════════ SCREEN: AUTH (unused — PIN gate replaces this) ═══════════ -->
  <div id="screen-auth" class="screen"></div>

  <!-- ═══════════ SCREEN: HOME (Profile Picker) ═══════════ -->
  <div id="screen-home" class="screen">
    <div id="home-content"></div>
  </div>

  <!-- ═══════════ SCREEN: SETUP WIZARD ═══════════ -->
  <div id="screen-setup" class="screen">
    <div id="setup-gate" style="flex:1;display:none;flex-direction:column;width:100%"></div>
    <div class="setup-wrap" id="setup-content"></div>
  </div>

  <!-- ═══════════ SCREEN: PIN ENTRY ═══════════ -->
  <div id="screen-pin" class="screen">
    <div id="pin-content"></div>
  </div>

  <!-- ═══════════ SCREEN: KID VIEW ═══════════ -->
  <div id="screen-kid" class="screen">
    <header class="app-header" id="kid-header"></header>
    <main  class="main-content" id="kid-content"></main>
    <nav   class="nav-bar"      id="kid-nav"></nav>
  </div>

  <!-- ═══════════ SCREEN: PARENT VIEW ═══════════ -->
  <div id="screen-parent" class="screen">
    <header class="app-header" id="parent-header"></header>
    <main  class="main-content" id="parent-content"></main>
    <nav   class="nav-bar"      id="parent-nav"></nav>
  </div>

  <!-- ═══════════ OVERLAYS ═══════════ -->
  <div id="ptr-indicator"></div>
  <div id="modal-root"></div>
  <div id="celebration-root"></div>
  <div id="confetti-root"></div>
  <div id="adv-editor-root"></div>
  <div id="settings-root"></div>
  <div id="nl-root"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-remote-config-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-functions-compat.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script src="capacitor-core.js"></script>
  <script src="app.js"></script>
</body>
</html>
